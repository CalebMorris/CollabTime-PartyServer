openapi: 3.0.3

info:
  title: collab-time Server API
  version: "1.0"
  description: |
    REST API for the collab-time collaboration server.

    Real-time collaboration is handled over a WebSocket connection — see `GET /ws`.

servers:
  - url: http://localhost:3000
    description: Local development server

security: []

paths:
  /ws:
    get:
      summary: WebSocket connection
      description: |
        Upgrade this HTTP GET to a WebSocket connection. All messages are JSON-encoded text frames.

        **Client → Server:** send a `WsClientMessage` frame.
        **Server → Client:** receive a `WsServerMessage` frame.
      operationId: connectWebSocket
      servers:
        - url: ws://localhost:3000
          description: Local development
      parameters:
        - name: Upgrade
          in: header
          required: true
          schema:
            type: string
            enum: [websocket]
        - name: Connection
          in: header
          required: true
          schema:
            type: string
            enum: [Upgrade]
      responses:
        "101":
          description: WebSocket connection established. All subsequent communication is via WebSocket frames.
          headers:
            Upgrade:
              schema:
                type: string
                enum: [websocket]
            Connection:
              schema:
                type: string
                enum: [Upgrade]

  /health:
    get:
      summary: Health check
      description: Always returns 200 while the process is running. Use `/ready` for orchestration probes.
      operationId: getHealth
      responses:
        "200":
          description: Server is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkStatus"
              examples:
                ok:
                  summary: Server is running
                  value:
                    status: ok

  /ready:
    get:
      summary: Readiness probe
      description: |
        Returns 200 when the server is ready to accept traffic.
        Returns 503 during graceful shutdown (after SIGTERM/SIGINT is received).
        Intended for Kubernetes `readinessProbe` or equivalent orchestration checks.
      operationId: getReady
      responses:
        "200":
          description: Server is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkStatus"
              examples:
                ok:
                  summary: Server is ready
                  value:
                    status: ok
        "503":
          description: Server is shutting down and no longer accepting traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShuttingDownStatus"
              examples:
                shutting_down:
                  summary: Graceful shutdown in progress
                  value:
                    status: shutting_down

  /capacity:
    get:
      summary: Capacity check
      description: |
        Returns whether the server is currently accepting new room creation.
        New room creation is gated on event loop p95 lag; existing room joins are unaffected.

        **Rate limited:** 10 requests per 60 seconds per client IP.
        A 429 response means the caller is polling too aggressively — back off before retrying.

        The response is always a soft signal. HTTP 200 is returned even when `accepting_rooms`
        is `false`; capacity is not an infrastructure failure.
      operationId: getCapacity
      responses:
        "200":
          description: Capacity status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapacityResponse"
              examples:
                accepting:
                  summary: Server is accepting new rooms
                  value:
                    accepting_rooms: true
                    reason: null
                at_capacity:
                  summary: Server is at capacity due to high load
                  value:
                    accepting_rooms: false
                    reason: HIGH_LOAD
        "429":
          description: Rate limit exceeded (10 requests per 60 seconds per IP).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorTooManyRequests"
              examples:
                too_many_requests:
                  summary: Rate limit exceeded
                  value:
                    error: Too Many Requests

  /metrics:
    get:
      summary: Server performance metrics
      description: |
        Returns event loop lag statistics collected by Node.js `perf_hooks.monitorEventLoopDelay`.
        `eventLoopLag` is `null` when the monitor is not running.
        All latency values are in milliseconds.
      operationId: getMetrics
      responses:
        "200":
          description: Current server metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"
              examples:
                running:
                  summary: Monitor is running
                  value:
                    eventLoopLag:
                      meanMs: 1.2
                      p50Ms: 0.9
                      p95Ms: 4.1
                      p99Ms: 12.3
                      maxMs: 87.4
                not_running:
                  summary: Monitor is not running
                  value:
                    eventLoopLag: null

components:
  schemas:
    OkStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    ShuttingDownStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [shutting_down]

    CapacityResponse:
      type: object
      required: [accepting_rooms, reason]
      properties:
        accepting_rooms:
          type: boolean
          description: >
            `true` when the server will create new rooms for joining clients.
            `false` when event loop p95 lag exceeds the configured threshold.
        reason:
          type: string
          nullable: true
          enum: [HIGH_LOAD]
          description: >
            `null` when `accepting_rooms` is `true`.
            `"HIGH_LOAD"` when the server is throttling new room creation due to event loop lag.

    ErrorTooManyRequests:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: ["Too Many Requests"]

    EventLoopStats:
      type: object
      required: [meanMs, p50Ms, p95Ms, p99Ms, maxMs]
      properties:
        meanMs:
          type: number
          minimum: 0
          description: Mean event loop lag in milliseconds.
        p50Ms:
          type: number
          minimum: 0
          description: 50th-percentile event loop lag in milliseconds.
        p95Ms:
          type: number
          minimum: 0
          description: 95th-percentile event loop lag in milliseconds. Used by the capacity gate.
        p99Ms:
          type: number
          minimum: 0
          description: 99th-percentile event loop lag in milliseconds.
        maxMs:
          type: number
          minimum: 0
          description: Maximum observed event loop lag in milliseconds.

    MetricsResponse:
      type: object
      required: [eventLoopLag]
      properties:
        eventLoopLag:
          type: object
          nullable: true
          description: >
            Event loop delay statistics. `null` when the monitor is not running.
          allOf:
            - $ref: "#/components/schemas/EventLoopStats"

    # WebSocket shared types

    WsParticipantSnapshot:
      type: object
      required: [participantToken, nickname, isConnected]
      properties:
        participantToken:
          type: string
          pattern: "^[0-9a-f]{32}$"
        nickname:
          type: string
        isConnected:
          type: boolean
        proposalEpochMs:
          type: integer
          minimum: 0
          maximum: 9999999999999
          description: Present only when the participant has submitted a proposal.

    WsRoomSnapshot:
      type: object
      required: [code, state, participants]
      properties:
        code:
          type: string
          pattern: "^[a-z]+-[a-z]+-[a-z]+$"
        state:
          type: string
          enum: [waiting, active, locked_in]
        participants:
          type: array
          items:
            $ref: "#/components/schemas/WsParticipantSnapshot"
        lockedInEpochMs:
          type: integer
          minimum: 0
          maximum: 9999999999999
          description: Present only when state is `locked_in`.

    # WebSocket client → server messages

    WsJoinMessage:
      type: object
      required: [type, roomCode]
      properties:
        type:
          type: string
          enum: [join]
        roomCode:
          type: string
          pattern: "^[a-z]+-[a-z]+-[a-z]+$"
        protocolVersion:
          type: string
          example: "1.0"

    WsRejoinMessage:
      type: object
      required: [type, roomCode, sessionToken]
      properties:
        type:
          type: string
          enum: [rejoin]
        roomCode:
          type: string
          pattern: "^[a-z]+-[a-z]+-[a-z]+$"
        sessionToken:
          type: string
          pattern: "^[0-9a-f]{32}$"
        protocolVersion:
          type: string
          example: "1.0"

    WsProposeMessage:
      type: object
      required: [type, epochMs]
      properties:
        type:
          type: string
          enum: [propose]
        epochMs:
          type: integer
          minimum: 0
          maximum: 9999999999999
          description: Unix timestamp in milliseconds truncated to the minute for lock-in comparison.

    WsLeaveMessage:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [leave]

    WsClientMessage:
      oneOf:
        - $ref: "#/components/schemas/WsJoinMessage"
        - $ref: "#/components/schemas/WsRejoinMessage"
        - $ref: "#/components/schemas/WsProposeMessage"
        - $ref: "#/components/schemas/WsLeaveMessage"
      discriminator:
        propertyName: type
        mapping:
          join: "#/components/schemas/WsJoinMessage"
          rejoin: "#/components/schemas/WsRejoinMessage"
          propose: "#/components/schemas/WsProposeMessage"
          leave: "#/components/schemas/WsLeaveMessage"

    # WebSocket server → client messages

    WsJoinedMessage:
      type: object
      required: [type, sessionToken, participantToken, nickname, protocolVersion, room]
      properties:
        type:
          type: string
          enum: [joined]
        sessionToken:
          type: string
          pattern: "^[0-9a-f]{32}$"
        participantToken:
          type: string
          pattern: "^[0-9a-f]{32}$"
        nickname:
          type: string
        protocolVersion:
          type: string
          example: "1.0"
        room:
          $ref: "#/components/schemas/WsRoomSnapshot"

    WsParticipantJoinedMessage:
      type: object
      required: [type, participantToken, nickname]
      properties:
        type:
          type: string
          enum: [participant_joined]
        participantToken:
          type: string
          pattern: "^[0-9a-f]{32}$"
        nickname:
          type: string

    WsParticipantLeftMessage:
      type: object
      required: [type, participantToken]
      properties:
        type:
          type: string
          enum: [participant_left]
        participantToken:
          type: string
          pattern: "^[0-9a-f]{32}$"

    WsParticipantDisconnectedMessage:
      type: object
      required: [type, participantToken]
      properties:
        type:
          type: string
          enum: [participant_disconnected]
        participantToken:
          type: string
          pattern: "^[0-9a-f]{32}$"

    WsParticipantReconnectedMessage:
      type: object
      required: [type, participantToken]
      properties:
        type:
          type: string
          enum: [participant_reconnected]
        participantToken:
          type: string
          pattern: "^[0-9a-f]{32}$"

    WsRoomActivatedMessage:
      type: object
      required: [type, participants]
      properties:
        type:
          type: string
          enum: [room_activated]
        participants:
          type: array
          items:
            type: object
            required: [participantToken, nickname]
            properties:
              participantToken:
                type: string
                pattern: "^[0-9a-f]{32}$"
              nickname:
                type: string

    WsRoomDeactivatedMessage:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [room_deactivated]

    WsProposalUpdatedMessage:
      type: object
      required: [type, participantToken, epochMs]
      properties:
        type:
          type: string
          enum: [proposal_updated]
        participantToken:
          type: string
          pattern: "^[0-9a-f]{32}$"
        epochMs:
          type: integer
          minimum: 0
          maximum: 9999999999999

    WsLockedInMessage:
      type: object
      required: [type, epochMs]
      properties:
        type:
          type: string
          enum: [locked_in]
        epochMs:
          type: integer
          minimum: 0
          maximum: 9999999999999

    WsRoomExpiredMessage:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [room_expired]

    WsErrorMessage:
      type: object
      required: [type, code, message]
      properties:
        type:
          type: string
          enum: [error]
        code:
          type: string
          enum:
            - ROOM_NOT_FOUND
            - ROOM_NOT_ACTIVE
            - ROOM_FULL
            - RATE_LIMITED
            - REJOIN_FAILED
            - INVALID_TOKEN
            - PROTOCOL_VERSION_MISMATCH
            - SERVER_AT_CAPACITY
        message:
          type: string

    WsServerMessage:
      oneOf:
        - $ref: "#/components/schemas/WsJoinedMessage"
        - $ref: "#/components/schemas/WsParticipantJoinedMessage"
        - $ref: "#/components/schemas/WsParticipantLeftMessage"
        - $ref: "#/components/schemas/WsParticipantDisconnectedMessage"
        - $ref: "#/components/schemas/WsParticipantReconnectedMessage"
        - $ref: "#/components/schemas/WsRoomActivatedMessage"
        - $ref: "#/components/schemas/WsRoomDeactivatedMessage"
        - $ref: "#/components/schemas/WsProposalUpdatedMessage"
        - $ref: "#/components/schemas/WsLockedInMessage"
        - $ref: "#/components/schemas/WsRoomExpiredMessage"
        - $ref: "#/components/schemas/WsErrorMessage"
      discriminator:
        propertyName: type
        mapping:
          joined: "#/components/schemas/WsJoinedMessage"
          participant_joined: "#/components/schemas/WsParticipantJoinedMessage"
          participant_left: "#/components/schemas/WsParticipantLeftMessage"
          participant_disconnected: "#/components/schemas/WsParticipantDisconnectedMessage"
          participant_reconnected: "#/components/schemas/WsParticipantReconnectedMessage"
          room_activated: "#/components/schemas/WsRoomActivatedMessage"
          room_deactivated: "#/components/schemas/WsRoomDeactivatedMessage"
          proposal_updated: "#/components/schemas/WsProposalUpdatedMessage"
          locked_in: "#/components/schemas/WsLockedInMessage"
          room_expired: "#/components/schemas/WsRoomExpiredMessage"
          error: "#/components/schemas/WsErrorMessage"
